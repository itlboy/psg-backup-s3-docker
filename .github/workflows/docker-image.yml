name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg_version: ["13", "14", "15", "16", "17", "17.5", "15.0"] # Bạn có thể thêm/xóa các phiên bản ở đây

    steps:
    -
      name: Checkout
      uses: actions/checkout@v3
    -
      name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    -
      name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    -
      name: Build and push
      uses: docker/build-push-action@v3
      with:
        context: .
        #platforms: linux/amd64,linux/arm64
        platforms: linux/amd64
        build-args: |
          PG_VERSION=${{ matrix.pg_version }}
        cache-from: type=registry,ref=itlboy/psg-backup-s3:build-cache-${{ matrix.pg_version }}
        cache-to: type=registry,ref=itlboy/psg-backup-s3:build-cache-${{ matrix.pg_version }},mode=max
        push: true
        tags: |
          itlboy/psg-backup-s3:${{ matrix.pg_version }}
